name: Publish
on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Setup Node 📦
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Build 🔨
        run: npm run build

      - name: Upload artifacts 🧩
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Download artifacts 🧩
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Create release draft 🕊️
        run: gh release create "${{ github.ref_name }}" --draft --target "${{ github.sha }}" dist/PdNaja.esm.js dist/PdNaja.esm.js.map
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publishPublic:
    name: Publish (public)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Download artifacts 🧩
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Setup Node 📦
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Publish release 🕊️
        run: npm publish --provenance --access public

  publishPrivate:
    name: Publish (private)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Download artifacts 🧩
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Setup Node 📦
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish release 🕊️
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
